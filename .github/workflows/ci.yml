name: CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest


    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "0000"
          POSTGRES_DB: health_db_test
        ports:
          - 5432:5432 # host port: container port container port — expose db to the runner so pytest can connect via localhost

        # check if PostgreSQL is ready to accept connections, r
        # un the health check every 10 seconds
        # each check times out after 5 seconds,
        # fail the container after 5 consecutive failures
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5



    steps:
      - uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r apps/backend/requirements.txt

      - name: Run tests
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://postgres:0000@localhost:5432/health_db_test
          SECURITY_KEY: test_secret_key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
        run: pytest tests/ -v

      - name: Build Docker image
        run: docker build apps/backend/