services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mlflow:
    image: ghcr.io/mlflow/mlflow
    ports:
      - "5004:5000"
    volumes:
      - ./mlruns:/mlruns
    environment:
      # MLflow 3.x adds DNS-rebinding host-header validation; without this it
      # rejects the docker-network hostname "mlflow:5000" with HTTP 403.
      # Matching is exact-string unless the entry contains "*", so use a glob
      # to cover any port the client uses.
      MLFLOW_SERVER_ALLOWED_HOSTS: "mlflow:*,mlflow,localhost:*,localhost,127.0.0.1:*,127.0.0.1"
    command: mlflow server --host 0.0.0.0 --port 5000

  backend:
    build:
      context: ../apps/backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECURITY_KEY: ${SECURITY_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT: sensors2care_registry
      MLFLOW_MODEL_NAME: SensorsCarePipeline
    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  consumer_delivery:
    build:
      context: ../apps/consumer_delivery
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_MODEL_NAME: SensorsCarePipeline
      MODEL_META_TTL_SECONDS: "30"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
      mlflow:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ../apps/frontend
    ports:
      - "3000:3000"
    environment:
      # Read by next.config.ts at server startup to build the /backend and /cdl
      # rewrite destinations. The browser only ever sees same-origin paths.
      BACKEND_BASE_URL: http://backend:8000
      CDL_BASE_URL: http://consumer_delivery:8001
    depends_on:
      backend:
        condition: service_started
      consumer_delivery:
        condition: service_started

volumes:
  pg_data:
